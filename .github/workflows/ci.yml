name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install shellcheck
        run: sudo apt-get install -y shellcheck
      - name: Lint common.sh
        run: shellcheck .baton/hooks/lib/common.sh
      - name: Lint write-lock.sh
        run: shellcheck .baton/hooks/write-lock.sh
      - name: Lint phase-guide.sh
        run: shellcheck .baton/hooks/phase-guide.sh
      - name: Lint bash-guard.sh
        run: shellcheck .baton/hooks/bash-guard.sh
      - name: Lint stop-guard.sh
        run: shellcheck .baton/hooks/stop-guard.sh
      - name: Lint post-write-tracker.sh
        run: shellcheck .baton/hooks/post-write-tracker.sh
      - name: Lint completion-check.sh
        run: shellcheck .baton/hooks/completion-check.sh
      - name: Lint pre-compact.sh
        run: shellcheck .baton/hooks/pre-compact.sh
      - name: Lint subagent-context.sh
        run: shellcheck .baton/hooks/subagent-context.sh
      - name: Lint adapters
        run: shellcheck .baton/adapters/cursor/adapter.sh
      - name: Lint setup.sh
        run: shellcheck setup.sh

  test-write-lock:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Run write-lock tests
        run: bash tests/test-write-lock.sh

  test-phase-guide:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run phase-guide tests
        run: bash tests/test-phase-guide.sh

  test-setup:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Run setup tests
        run: bash tests/test-setup.sh

  test-stop-guard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run stop-guard tests
        run: bash tests/test-stop-guard.sh

  test-adapters:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run adapter tests
        run: bash tests/test-adapters.sh

  test-constitution-consistency:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check constitution consistency
        run: sh tests/test-constitution-consistency.sh

  test-multi-ide:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run multi-IDE tests
        run: bash tests/test-multi-ide.sh

  test-annotation-protocol:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run annotation protocol tests
        run: bash tests/test-annotation-protocol.sh

  test-cli:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run CLI tests
        run: bash tests/test-cli.sh

  test-new-hooks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run new hooks tests
        run: bash tests/test-new-hooks.sh

  test-ide-capability-consistency:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run IDE capability consistency tests
        run: bash tests/test-ide-capability-consistency.sh

  test-adapters-v2:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run adapters v2 tests
        run: bash tests/test-adapters-v2.sh
